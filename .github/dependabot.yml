# Dependabot configuration file.
# See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

enable-beta-ecosystems: true

updates:
  - package-ecosystem: "pub"
    directory: "."
    schedule:
      interval: "monthly"
  - package-ecosystem: "pub"
    directory: "packages/a2ktik_asset"
    schedule:
      interval: "monthly"
  - package-ecosystem: "pub"
    directory: "packages/a2ktik_kar"
    schedule:
      interval: "monthly"
  - package-ecosystem: "pub"
    directory: "packages/a2ktik_kar/example/a2ktik_kar_example"
    schedule:
      interval: "monthly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
